name: weekly-report
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python report.py
      - run: python dashboard.py
      - run: |
          git config user.name "weekly-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/ docs/
          git commit -m "chore: weekly report" || echo "no changes"
          git push
